<svg viewBox="0 0 700 400" xmlns="http://www.w3.org/2000/svg"
     style="font-family:-apple-system,system-ui,sans-serif;background:white;">
  <text x="350" y="22" text-anchor="middle" font-size="13" font-weight="700" fill="#222">
    Stress Flips KOR Signaling in Cortically-Projecting VTA Dopamine Neurons
  </text>
  <text x="350" y="40" text-anchor="middle" font-size="10" fill="#666">
    Schematic of Margolis EB (2025) biorXiv — same KOR, opposite effect after stress
  </text>
  <text x="350" y="57" text-anchor="middle" font-size="10" fill="#444">
    Kappa opioid receptors normally inhibit DA neuron firing; stress reverses this to excitation
  </text>
  <text x="350" y="72" text-anchor="middle" font-size="9" fill="#888">
    Only in a subset of DA neurons projecting to prefrontal cortex — not in all VTA DA neurons
  </text>
  <rect x="30" y="92" width="290" height="260" rx="8" fill="#f0f8ff" stroke="#1a5c8a" stroke-width="1.5"/><text x="175" y="115" text-anchor="middle" font-size="12" font-weight="700" fill="#1a5c8a">Naive state</text><circle cx="175" cy="180" r="32" fill="#1a5c8a" opacity="0.12"/><circle cx="175" cy="180" r="32" fill="none" stroke="#1a5c8a" stroke-width="1.5"/><text x="175" y="172" text-anchor="middle" font-size="9" fill="#1a5c8a" font-weight="700">VTA DA</text><text x="175" y="186" text-anchor="middle" font-size="8.5" fill="#1a5c8a">neuron</text><text x="175" y="199" text-anchor="middle" font-size="7.5" fill="#888">(cortically-projecting)</text><rect x="195" y="160" width="34" height="20" rx="4" fill="#8e44ad" opacity="0.15"/><rect x="195" y="160" width="34" height="20" rx="4" fill="none" stroke="#8e44ad" stroke-width="1"/><text x="212" y="174" text-anchor="middle" font-size="8.5" fill="#8e44ad" font-weight="700">KOR</text><line x1="175" y1="213" x2="175" y2="250" stroke="#27ae60" stroke-width="2" marker-end="url(#tri)"/><text x="181" y="238" font-size="8.5" fill="#27ae60">canonical</text><rect x="60" y="252" width="230" height="34" rx="5" fill="#f0fff4" stroke="#27ae60" stroke-width="1.5"/><text x="175" y="273" text-anchor="middle" font-size="11" fill="#27ae60" font-weight="700">INHIBITORY ↓</text><rect x="380" y="92" width="290" height="260" rx="8" fill="#fff8f0" stroke="#c0392b" stroke-width="1.5"/><text x="525" y="115" text-anchor="middle" font-size="12" font-weight="700" fill="#c0392b">After stress</text><circle cx="525" cy="180" r="32" fill="#c0392b" opacity="0.12"/><circle cx="525" cy="180" r="32" fill="none" stroke="#c0392b" stroke-width="1.5"/><text x="525" y="172" text-anchor="middle" font-size="9" fill="#c0392b" font-weight="700">VTA DA</text><text x="525" y="186" text-anchor="middle" font-size="8.5" fill="#c0392b">neuron</text><text x="525" y="199" text-anchor="middle" font-size="7.5" fill="#888">(cortically-projecting)</text><rect x="545" y="160" width="34" height="20" rx="4" fill="#8e44ad" opacity="0.15"/><rect x="545" y="160" width="34" height="20" rx="4" fill="none" stroke="#8e44ad" stroke-width="1"/><text x="562" y="174" text-anchor="middle" font-size="8.5" fill="#8e44ad" font-weight="700">KOR</text><line x1="525" y1="213" x2="525" y2="250" stroke="#e67e22" stroke-width="2" marker-end="url(#tri)"/><text x="531" y="238" font-size="8.5" fill="#e67e22">reversal</text><rect x="410" y="252" width="230" height="34" rx="5" fill="#fff0f0" stroke="#c0392b" stroke-width="1.5"/><text x="525" y="273" text-anchor="middle" font-size="11" fill="#c0392b" font-weight="700">EXCITATORY ↑</text><text x="350" y="165" text-anchor="middle" font-size="10" fill="#8e44ad" font-weight="700">Dynorphin (KOR agonist)</text><line x1="328" y1="180" x2="372" y2="180" stroke="#8e44ad" stroke-width="1.5" stroke-dasharray="5,3"/><text x="350" y="195" text-anchor="middle" font-size="9" fill="#888">same receptor, opposite output</text>
  <text x="350" y="390" text-anchor="middle" font-size="8.5" fill="#aaa">
    Margolis EB (2025) biorXiv · "A switch in kappa opioid receptor signaling from inhibitory to excitatory induced by stress"
  </text>
</svg>